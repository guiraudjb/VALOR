<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur d'Organigramme - VALOR</title>
    <link rel="stylesheet" href="../libs/dsfr-v1.14.3/dist/scheme/scheme.min.css">
    
    <style>
        :root {
            --bg-color: #F6F6F6; --panel-bg: #FFFFFF;
            --bleu-france: #000091; --gris-galet: #AEA397;
            --font-family: 'Marianne', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0; font-family: var(--font-family); display: flex;
            height: 100vh; background-color: var(--bg-color); color: #1E1E1E; overflow: hidden;
        }

        #sidebar {
            width: 350px; background: var(--panel-bg); border-right: 1px solid #ddd;
            padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.05); overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px; z-index: 10;
        }

        h1, h2, h3 { margin: 0 0 10px 0; font-size: 1.2rem; }
        
        .control-group {
            display: flex; flex-direction: column; gap: 5px; margin-bottom: 5px;
            padding: 10px; border: 1px solid #eee; border-radius: 4px;
        }

        .row-group { display: flex; gap: 10px; align-items: center; }

        label { font-size: 0.9rem; font-weight: bold; color: #333; }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%; padding: 8px; border: 1px solid #ccc;
            border-radius: 4px; box-sizing: border-box; font-family: inherit;
        }

        input[type="range"] { width: 100%; cursor: pointer; }

        button {
            background-color: var(--bleu-france); color: white; border: none;
            padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background-color: #1212ff; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #cccccc; cursor: not-allowed; transform: none; }
        button.secondary { background-color: var(--gris-galet); }
        button.action-btn { background-color: #00A95F; margin-top: 5px;}
        button.action-btn:hover { background-color: #00874c; }

        .style-btn {
            background-color: #f0f0f0; color: #333; flex: 1;
            font-size: 1rem; padding: 8px; border: 1px solid #ccc;
        }
        .style-btn.active { background-color: var(--bleu-france); color: white; border-color: var(--bleu-france); }

        #icon-preview-container { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        #icon-preview { width: 32px; height: 32px; border: 1px solid #eee; border-radius: 4px; padding: 4px; object-fit: contain; }

        #workspace { flex-grow: 1; position: relative; overflow: hidden; }

        .page-preview {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: white;
            background-image: radial-gradient(#d0d0d0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        svg { width: 100%; height: 100%; font-family: var(--font-family); user-select: none; cursor: grab; }
        svg:active { cursor: grabbing; }
        .node-group { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center; cursor: pointer; }
        .node-group:hover { transform: scale(1.01); }
        
        #zoom-controls {
            position: absolute; bottom: 20px; right: 20px; display: flex; gap: 8px;
            z-index: 100; background: white; padding: 8px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .zoom-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; padding: 0; }
        .project-toolbar { display: flex; gap: 5px; margin-bottom: 10px; }
        .project-toolbar button { padding: 8px; font-size: 0.85rem; flex: 1; }
        .resize-handle { cursor: nwse-resize; fill: var(--bleu-france); stroke: white; stroke-width: 1; }
        
        /* Styles pour les accordéons natifs de la barre latérale */
        details {
            background: var(--panel-bg);
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 5px;
            transition: all 0.2s ease;
        }
        summary {
            font-weight: bold;
            font-size: 0.95rem;
            padding: 10px 12px;
            cursor: pointer;
            background: #f8f8f8;
            border-radius: 4px;
            list-style: none; /* Masque la flèche par défaut */
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--bleu-france);
        }
        summary::-webkit-details-marker { display: none; } /* Pour Safari */
        summary::after { 
            content: '▼'; 
            font-size: 0.75em; 
            transition: transform 0.3s ease; 
        }
        details[open] summary::after { transform: rotate(-180deg); }
        details[open] summary { 
            border-bottom-left-radius: 0; 
            border-bottom-right-radius: 0; 
            border-bottom: 1px solid #ddd; 
            background: #f0f0f0;
        }
        .details-content {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        /* Ajustement des anciens control-group dans les accordéons */
        details .control-group { border: none; padding: 0; margin: 0; }
        
        
        /* Styles pour l'éditeur de texte au double-clic */
        #in-place-editor {
            position: fixed; background: rgba(255, 255, 255, 0.95);
            border: 2px solid var(--bleu-france); border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); outline: none;
            resize: both; text-align: center; z-index: 2000;
            color: #1E1E1E !important; /* Force un texte foncé pour la lisibilité en édition */
        }

        /* Styles pour le menu contextuel (clic droit) */
        #context-menu {
            display: none; position: fixed; background: white; border: 1px solid #ccc;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 4px; padding: 5px; 
            z-index: 2000; flex-direction: column; gap: 2px; min-width: 170px;
        }
        #context-menu button {
            background: none; color: #333; text-align: left; padding: 8px 10px; 
            font-weight: normal; border-radius: 2px;
        }
        #context-menu button:hover { background: #f0f0f0; }
        #context-menu button:disabled { color: #aaa; background: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Éditeur d'Organigramme</h2>

        <div class="project-toolbar">
            <button class="secondary" id="btn-undo" onclick="undo()" title="Annuler (Ctrl+Z)" disabled>↩ Annuler</button>
            <button class="secondary" id="btn-redo" onclick="redo()" title="Rétablir (Ctrl+Y)" disabled>↪ Rétab.</button>
        </div>
        <div class="project-toolbar">
            <button class="secondary" onclick="exportProject()">💾 Sauver Projet</button>
            <button class="secondary" onclick="document.getElementById('file-import').click()">📂 Ouvrir</button>
            <input type="file" id="file-import" accept=".valor,.json" style="display: none;" onchange="importProject(event)">
        </div>

        <details>
            <summary>Paramètres du Schéma</summary>
            <div class="details-content">
                <div class="control-group">
                    <label for="diagram-direction">Sens de rotation général :</label>
                    <select id="diagram-direction" onchange="saveState(); updateGlobalSettings()">
                        <option value="clockwise">Sens Horaire</option>
                        <option value="counterclockwise">Sens Anti-horaire</option>
                    </select>
                </div>
            </div>
        </details>

        <div class="control-group" style="margin-top: 10px;">
            <label for="node-select">Élément sélectionné :</label>
            <select id="node-select" onchange="loadNodeData(); renderSVG();">
                <option value="center">Bloc Central</option>
            </select>
        </div>

        <details open>
            <summary>Texte & Typographie</summary>
            <div class="details-content">
                <div class="control-group">
                    <textarea id="node-text" rows="3" placeholder="Saisissez votre texte ici..." onchange="saveState(); updateNode(false)"></textarea>
                </div>
                <div class="control-group">
                    <select id="node-font-family" onchange="saveState(); updateNode(false)" style="margin-bottom: 5px;">
                        <option value="'Marianne', system-ui, sans-serif">Marianne</option>
                        <option value="Arial, sans-serif">Arial</option>
                        <option value="'Times New Roman', serif">Times New Roman</option>
                    </select>
                    <div class="row-group">
                        <input type="number" id="node-font-size" value="30" min="8" max="72" onchange="saveState(); updateNode(false)" style="flex: 1;">
                        <select id="node-text-color" onchange="saveState(); updateNode(false)" style="flex: 2;">
                            <option value="#000000">Noir</option>
                            <option value="#FFFFFF">Blanc</option>
                            <option value="#000091">Bleu France</option>
                        </select>
                    </div>
                    <div class="row-group" style="margin-top: 5px;">
                        <button id="btn-bold" class="style-btn" onclick="saveState(); toggleTextStyle('bold')" style="font-weight: bold;">G</button>
                        <button id="btn-italic" class="style-btn" onclick="saveState(); toggleTextStyle('italic')" style="font-style: italic;">I</button>
                        <button id="btn-strike" class="style-btn" onclick="saveState(); toggleTextStyle('strike')" style="text-decoration: line-through;">S</button>
                    </div>
                </div>
            </div>
        </details>

        <details>
            <summary>Forme & Apparence</summary>
            <div class="details-content">
                <div class="control-group">
                    <label for="node-shape">Forme de la bulle :</label>
                    <select id="node-shape" onchange="saveState(); updateNode(false)">
                        <option value="circle">Cercle classique</option>
                        <option value="rect">Rectangle</option>
                        <option value="rhombus">Losange</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="node-color">Couleur de fond :</label>
                    <select id="node-color" onchange="saveState(); updateNode(false)"></select>
                </div>
                <div class="control-group" id="size-control-group">
                    <div class="row-group" style="justify-content: space-between; margin-bottom: 5px;">
                        <label for="node-size">Taille (<span id="size-val">250</span>px) :</label>
                        <button class="secondary style-btn" style="font-size: 0.75rem; padding: 4px 8px; flex: unset;" onclick="saveState(); autoFitCurrentNode()">Ajuster</button>
                    </div>
                    <input type="range" id="node-size" min="120" max="800" value="250" onchange="saveState();" oninput="updateNode(true)">
                </div>
            </div>
        </details>

        <details>
            <summary>Icône & Image</summary>
            <div class="details-content">
                <div class="control-group" id="icon-group">
                    <div class="row-group">
                        <select id="icon-theme-select" onchange="populateIconSelect()"></select>
                        <select id="icon-select" onchange="updateIconPreview()"></select>
                    </div>
                    <div class="row-group" style="margin-top: 5px;">
                        <button class="secondary" onclick="document.getElementById('custom-image-upload').click()" style="flex: 1; font-size: 0.85rem; padding: 6px;">📁 Image perso...</button>
                        <input type="file" id="custom-image-upload" accept="image/png, image/jpeg, image/svg+xml, image/webp" style="display: none;" onchange="uploadCustomImage(event)">
                    </div>
                    <div id="icon-preview-container">
                        <img id="icon-preview" src="" alt="" style="display: none;">
                        <button onclick="saveState(); applyIcon()" class="action-btn" style="flex:1;">Appliquer</button>
                        <button onclick="saveState(); removeIcon()" class="secondary" style="flex:1;">Retirer</button>
                    </div>
                </div>
            </div>
        </details>

        <div class="control-group" style="margin-top: 10px;">
            <button onclick="saveState(); addMainBubble()" class="action-btn">+ Ajouter bulle principale</button>
            <button id="btn-add-sub" onclick="saveState(); addSubBubble()" class="action-btn">+ Ajouter sous-bulle</button>
            <button id="btn-delete" onclick="saveState(); removeSelectedNode()" class="secondary" style="margin-top: 5px; color: #E91719; background-color: #fef4f3; border: 1px solid #CE614A;">- Supprimer sélection</button>
        </div>

        <hr style="width:100%; border:0; border-top:1px solid #ddd; margin: auto 0 10px 0;">
        <button onclick="exportSVG()">Exporter SVG</button>
        <button onclick="exportPNG()" style="margin-top: 5px;">Exporter PNG HQ</button>
    </div>
    
    <div id="workspace">
        <div class="page-preview" id="preview-container">
            <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
                <defs id="gradient-defs"></defs>
                <g id="connectors"></g>
                <g id="nodes"></g>
            </svg>
        </div>
        <div id="zoom-controls">
            <button class="secondary style-btn zoom-btn" onclick="zoomOut()">-</button>
            <button class="secondary style-btn" onclick="resetZoom()" style="padding: 0 12px;">Centrer</button>
            <button class="secondary style-btn zoom-btn" onclick="zoomIn()">+</button>
        </div>
    </div>
    <div id="context-menu">
        <button onclick="cmEdit()">✏️ Modifier le texte</button>
        <button onclick="cmAutoFit()">📏 Ajuster la taille</button>
        <button id="cm-add-sub" onclick="cmAddSub()">➕ Ajouter sous-bulle</button>
        <hr style="margin:5px 0; border:0; border-top:1px solid #ddd;">
        <button onclick="cmDelete()" style="color: #E91719;">🗑️ Supprimer</button>
    </div>

    <script>
        const PALETTE_SOLID = {
            "Blanc Premium": "#FFFFFF",
            "Bleu France": "#000091",
            "Rouge Divergent": "#E91719",
            "Vert Émeraude": "#00A95F",
            "Vert Tilleul-Verveine": "#B7A73F",
            "Vert Bourgeon": "#68A532",
            "Vert Menthe": "#009081",
            "Vert Archipel": "#009099",
            "Bleu Écume": "#465F9D",
            "Bleu Cumulus": "#417DC4",
            "Violet Glycine": "#A558A0",
            "Rose Macaron": "#E18B76",
            "Rose Tuile": "#CE614A",
            "Orange Terre Battue": "#E4794A",
            "Jaune Tournesol": "#C8AA39",
            "Jaune Moutarde": "#C3992A",
            "Marron Café Crème": "#D1B781",
            "Marron Caramel": "#C08C65",
            "Marron Opéra": "#BD987A",
            "Beige Gris Galet": "#AEA397",
            "Noir": "#000000"
        };

        const PALETTE_GRADIENTS = {
            sequentialDescending: "linear-gradient(to right, #e3e3fd, #000091)",
            sequentialAscending: "linear-gradient(to right, #000091, #e3e3fd)",
            divergentDescending: "linear-gradient(to right, #298641, #EFB900, #E91719)",
            divergentAscending: "linear-gradient(to right, #E91719, #EFB900, #298641)",
            categorical: "linear-gradient(to right, #5C68E5, #82B5F2, #29598F, #31A7AE, #81EEF5, #B478F1, #CFB1F5, #CECECE)",
            tilleulVerveineDescending: "linear-gradient(to right, #fef7da, #B7A73F)",
            tilleulVerveineAscending: "linear-gradient(to right, #B7A73F, #fef7da)",
            bourgeonDescending: "linear-gradient(to right, #e6feda, #68A532)",
            bourgeonAscending: "linear-gradient(to right, #68A532, #e6feda)",
            emeraudeDescending: "linear-gradient(to right, #e3fdeb, #00A95F)",
            emeraudeAscending: "linear-gradient(to right, #00A95F, #e3fdeb)",
            mentheDescending: "linear-gradient(to right, #dffdf7, #009081)",
            mentheAscending: "linear-gradient(to right, #009081, #dffdf7)",
            archipelDescending: "linear-gradient(to right, #e5fbfd, #009099)",
            archipelAscending: "linear-gradient(to right, #009099, #e5fbfd)",
            ecumeDescending: "linear-gradient(to right, #f4f6fe, #465F9D)",
            ecumeAscending: "linear-gradient(to right, #465F9D, #f4f6fe)",
            cumulusDescending: "linear-gradient(to right, #f3f6fe, #417DC4)",
            cumulusAscending: "linear-gradient(to right, #417DC4, #f3f6fe)",
            glycineDescending: "linear-gradient(to right, #fef3fd, #A558A0)",
            glycineAscending: "linear-gradient(to right, #A558A0, #fef3fd)",
            macaronDescending: "linear-gradient(to right, #fef4f2, #E18B76)",
            macaronAscending: "linear-gradient(to right, #E18B76, #fef4f2)",
            tuileDescending: "linear-gradient(to right, #fef4f3, #CE614A)",
            tuileAscending: "linear-gradient(to right, #CE614A, #fef4f3)",
            terreBattueDescending: "linear-gradient(to right, #fef4f2, #E4794A)",
            terreBattueAscending: "linear-gradient(to right, #E4794A, #fef4f2)",
            tournesolDescending: "linear-gradient(to right, #fef6e3, #C8AA39)",
            tournesolAscending: "linear-gradient(to right, #C8AA39, #fef6e3)",
            moutardeDescending: "linear-gradient(to right, #fef5e8, #C3992A)",
            moutardeAscending: "linear-gradient(to right, #C3992A, #fef5e8)",
            cafeCremeDescending: "linear-gradient(to right, #fbf6ed, #D1B781)",
            cafeCremeAscending: "linear-gradient(to right, #D1B781, #fbf6ed)",
            caramelDescending: "linear-gradient(to right, #fbf5f2, #C08C65)",
            caramelAscending: "linear-gradient(to right, #C08C65, #fbf5f2)",
            operaDescending: "linear-gradient(to right, #fbf5f2, #BD987A)",
            operaAscending: "linear-gradient(to right, #BD987A, #fbf5f2)",
            grisGaletDescending: "linear-gradient(to right, #f9f8f6, #AEA397)",
            grisGaletAscending: "linear-gradient(to right, #AEA397, #f9f8f6)"
        };

        const defaultTypography = { fontFamily: "'Marianne', system-ui, sans-serif", fontSize: 26, isBold: false, isItalic: false, isStrike: false };

        let diagramData = {
            direction: 'clockwise',
            center: { text: "OUTIL\nVALOR", color: "#FFFFFF", shape: "rect", size: 300, manualSize: true, textColor: "#000091", ...defaultTypography, isBold: true, fontSize: 36, icon: null, isCustomImage: false, iconSizeScale: 0.35 },
            bubbles: [
                { text: "RAPPORTS\nTERRITORIAUX", color: "cumulusAscending", shape: "circle", size: 280, manualSize: false, textColor: "#000000", icon: null, isCustomImage: false, iconSizeScale: 0.35, children: [
                    { text: "Analyses", color: "grisGaletAscending", shape: "circle", size: 160, manualSize: false, textColor: "#000000", icon: null, isCustomImage: false, iconSizeScale: 0.35, children: [], ...defaultTypography, fontSize: 20 },
                    { text: "Données", color: "grisGaletAscending", shape: "circle", size: 160, manualSize: false, textColor: "#000000", icon: null, isCustomImage: false, iconSizeScale: 0.35, children: [], ...defaultTypography, fontSize: 20 }
                ], ...defaultTypography },
                { text: "CARTES\nGRAPHIQUES", color: "emeraudeAscending", shape: "circle", size: 280, manualSize: false, textColor: "#000000", icon: null, isCustomImage: false, iconSizeScale: 0.35, children: [], ...defaultTypography },
                { text: "PRÉSENTATIONS", color: "tournesolAscending", shape: "circle", size: 280, manualSize: false, textColor: "#000000", icon: null, isCustomImage: false, iconSizeScale: 0.35, children: [], ...defaultTypography }
            ]
        };

        const LIB_PREFIX = "../libs/dsfr-v1.14.3/dist/icons/";
        const dsfrIconsByCategory = {
            "business": ["briefcase-fill", "calculator-fill", "pie-chart-fill", "bar-chart-fill"],
            "map": ["map-pin-2-fill", "earth-fill", "france-fill"],
            "system": ["settings-5-fill", "question-fill"],
            "document": ["file-text-fill", "folder-2-fill"]
        };

        let historyPast = []; let historyFuture = []; const MAX_HISTORY = 30;
        function saveState() { historyPast.push(JSON.stringify(diagramData)); if(historyPast.length>MAX_HISTORY)historyPast.shift(); historyFuture=[]; updateHistoryUI(); }
        function undo() { if(historyPast.length===0)return; historyFuture.push(JSON.stringify(diagramData)); diagramData=JSON.parse(historyPast.pop()); updateHistoryUI(); updateSelectMenu(); loadNodeData(); renderSVG(); }
        function redo() { if(historyFuture.length===0)return; historyPast.push(JSON.stringify(diagramData)); diagramData=JSON.parse(historyFuture.pop()); updateHistoryUI(); updateSelectMenu(); loadNodeData(); renderSVG(); }
        function updateHistoryUI() { document.getElementById('btn-undo').disabled = historyPast.length===0; document.getElementById('btn-redo').disabled = historyFuture.length===0; }
        
        function exportProject() { const d="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(diagramData)); const a=document.createElement('a'); a.href=d; a.download="projet_valor.valor"; a.click(); }
        function importProject(e) { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=async(ev)=>{try{saveState(); diagramData=JSON.parse(ev.target.result); await initDefaultIcons(); updateSelectMenu(); loadNodeData(); renderSVG(); resetZoom();}catch(err){alert("Fichier invalide.");}}; r.readAsText(f); }
        document.addEventListener('keydown', e => { if(e.ctrlKey && e.key==='z'){e.preventDefault();undo();} if(e.ctrlKey && e.key==='y'){e.preventDefault();redo();} });

        let vbX=0, vbY=0, vbWidth=1600, vbHeight=1200, isPanningView=false, startPanClientX=0, startPanClientY=0, startVbX=0, startVbY=0;
        function applyViewBox() { document.getElementById('canvas').setAttribute('viewBox', `${vbX} ${vbY} ${vbWidth} ${vbHeight}`); }
        function initPanZoom() {
            const w=document.getElementById('workspace');
            w.addEventListener('wheel', e => { e.preventDefault(); const f=e.deltaY>0?1.08:0.92; const s=document.getElementById('canvas'); const pt=s.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY; const svgP=pt.matrixTransform(s.getScreenCTM().inverse()); vbX-=(vbWidth*f-vbWidth)*((svgP.x-vbX)/vbWidth); vbY-=(vbHeight*f-vbHeight)*((svgP.y-vbY)/vbHeight); vbWidth*=f; vbHeight*=f; applyViewBox(); }, {passive:false});
            w.addEventListener('pointerdown', e => { if(['preview-container','canvas'].includes(e.target.id)||e.target.tagName==='svg'){ isPanningView=true; startPanClientX=e.clientX; startPanClientY=e.clientY; startVbX=vbX; startVbY=vbY; } });
            window.addEventListener('pointermove', e => { if(isPanningView){ const r=document.getElementById('canvas').getBoundingClientRect(); vbX=startVbX-(e.clientX-startPanClientX)*(vbWidth/r.width); vbY=startVbY-(e.clientY-startPanClientY)*(vbHeight/r.height); applyViewBox(); } });
            window.addEventListener('pointerup', () => isPanningView=false);
        }
        function zoomIn() { const f=0.8; vbX-=(vbWidth*f-vbWidth)/2; vbY-=(vbHeight*f-vbHeight)/2; vbWidth*=f; vbHeight*=f; applyViewBox(); }
        function zoomOut() { const f=1.2; vbX-=(vbWidth*f-vbWidth)/2; vbY-=(vbHeight*f-vbHeight)/2; vbWidth*=f; vbHeight*=f; applyViewBox(); }

        function calculateMaxExtent() {
            let totalMainCircumferenceRequired = 0; let maxMainBubbleSize = 0;
            diagramData.bubbles.forEach(b => {
                const bSize = Number(b.size) || 250;
                totalMainCircumferenceRequired += bSize + 50;
                if(bSize > maxMainBubbleSize) maxMainBubbleSize = bSize;
            });
            const centerSize = Number(diagramData.center.size) || 300;
            let minRadiusByCenter = (centerSize / 2) + (maxMainBubbleSize / 2) + 40; 
            let radiusByCircumference = totalMainCircumferenceRequired / (2 * Math.PI);
            const orbitRadius = Math.max(minRadiusByCenter, radiusByCircumference);
            let maxExtent = orbitRadius + (maxMainBubbleSize / 2);
            diagramData.bubbles.forEach(bubble => {
                let bSize = Number(bubble.size) || 250;
                let bubbleExtent = orbitRadius + (bSize / 2);
                if (bubbleExtent > maxExtent) maxExtent = bubbleExtent;
                if (bubble.children.length > 0) {
                    let maxSubSize = Math.max(...bubble.children.map(s => Number(s.size) || 160));
                    let subOrbit = (bSize / 2) + (maxSubSize / 2) + 80;
                    let subExtent = orbitRadius + subOrbit + (maxSubSize / 2);
                    if (subExtent > maxExtent) maxExtent = subExtent;
                }
            });
            return { orbitRadius, maxExtent };
        }

        function calculateOptimalSize(node) {
            const fSize = node.fontSize || 30; const lines = (node.text || "").split('\n');
            let maxChars = 5, numLines = 0;
            lines.forEach(l => { maxChars = Math.max(maxChars, l.length > 22 ? 22 : l.length); numLines += Math.ceil(l.length / 22) || 1; });
            const W = maxChars * (fSize * 0.55); 
            let H = numLines * (fSize * 1.25);
            
            // CORRECTION: Utilisation d'une base constante pour l'icône, au lieu de node.size (qui créait une boucle)
            if (node.iconBase64 || node.icon) H += 120 + 20; 
            
            let optimalSize = node.shape === 'rect' ? Math.ceil(Math.max(W / 0.75, H / 0.40)) : Math.ceil(Math.sqrt(W * W + H * H) / 0.75);
            return optimalSize < 120 ? 120 : (optimalSize > 800 ? 800 : optimalSize);
        }

        function drawCurve(parent, x1, y1, x2, y2, strokeColor) {
            // FIX : Contournement du bug SVG des navigateurs sur les dégradés à dimension nulle.
            // On force la "Bounding Box" à avoir au moins 0.1px de dimension.
            if (Math.abs(x1 - x2) < 0.1) x2 += 0.1;
            if (Math.abs(y1 - y2) < 0.1) y2 += 0.1;

            const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            const c1x=x1+(x2-x1)*0.4, c1y=y1+(y2-y1)*0.1, c2x=x2-(x2-x1)*0.1, c2y=y2-(y2-y1)*0.4;
            p.setAttribute('d', `M ${x1} ${y1} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${x2} ${y2}`);
            
            // Logique de coloration intelligente
            let finalColor = '#A0A0A0'; // Gris par défaut
            if (strokeColor) {
                if (strokeColor === '#FFFFFF') finalColor = '#A0A0A0'; // Le blanc serait invisible
                else if (strokeColor.startsWith('#')) finalColor = strokeColor;
                else finalColor = `url(#grad-${strokeColor})`;
            }

            p.setAttribute('stroke', finalColor); 
            p.setAttribute('stroke-width', '4'); // Un peu plus épais pour mieux voir la couleur
            p.setAttribute('fill', 'none'); 
            p.setAttribute('stroke-linecap', 'round');
            p.setAttribute('opacity', '0.7'); // Légèrement transparent pour ne pas écraser le texte
            parent.appendChild(p);
        }

        function renderSVG() {
            const cG = document.getElementById('connectors'), nG = document.getElementById('nodes');
            cG.innerHTML = ''; nG.innerHTML = '';
            const { orbitRadius } = calculateMaxExtent(), bCount = diagramData.bubbles.length || 1;
            const dir = diagramData.direction === 'clockwise' ? 1 : -1, mStep = dir * (2 * Math.PI) / bCount, start = -Math.PI / 2; 
            
            // Dessin du centre
            drawNode(nG, diagramData.center, 0, 0, 'center');
            
            // Dessin des bulles principales
            diagramData.bubbles.forEach((b, i) => {
                const a = start + i * mStep, bx = orbitRadius * Math.cos(a), by = orbitRadius * Math.sin(a);
                
                // Appel à drawCurve AVEC la couleur de la bulle cible (b.color)
                drawCurve(cG, 0, 0, bx, by, b.color);
                
                const g = drawNode(nG, b, bx, by, i.toString()); g.setAttribute('class', 'node-group draggable');
                const isSelected = (i.toString() === document.getElementById('node-select').value);

                // Événements de souris pour le Drag & Drop
                g.onpointerdown = e => { 
                    if(e.target.classList.contains('resize-handle')) return; 
                    e.stopPropagation(); if(e.button!==0)return; 
                    isDraggingNode=true; dragItemIndex=i; dragOriginX=bx; dragOriginY=by; hoverItemIndex=null; 
                    g.style.opacity='0.4'; dragGhost=g.cloneNode(true); dragGhost.style.opacity='0.7'; dragGhost.style.pointerEvents='none'; 
                    document.getElementById('canvas').appendChild(dragGhost); selectNodeFromCanvas(i.toString()); 
                };
                
                // EFFET VISUEL : Entrée sur une cible de drop
                g.onpointerenter = () => { 
                    if(isDraggingNode && dragItemIndex !== null && dragItemIndex !== i){ 
                        hoverItemIndex = i; 
                        const s = g.querySelector('.node-shape'); 
                        if(s) {
                            s.setAttribute('stroke', '#00A95F'); // Vert validation
                            s.setAttribute('stroke-width', '6');
                            g.style.transform = 'scale(1.05)'; // Agrandissement
                        } 
                    } 
                };
                
                // EFFET VISUEL : Sortie de la cible
                g.onpointerleave = () => { 
                    if(isDraggingNode && dragItemIndex !== null && dragItemIndex !== i){ 
                        if(hoverItemIndex === i) hoverItemIndex = null; 
                        const s = g.querySelector('.node-shape'); 
                        if(s) {
                            s.setAttribute('stroke', isSelected ? '#000091' : 'rgba(0,0,0,0.1)');
                            s.setAttribute('stroke-width', isSelected ? '4' : '1');
                            g.style.transform = ''; // Retour à la normale
                        } 
                    } 
                };

                // Dessin des sous-bulles
                if (b.children.length > 0) {
                    let mSS = Math.max(...b.children.map(s => Number(s.size) || 160));
                    let sO = ((Number(b.size) || 250) / 2) + (mSS / 2) + 100, sA = Math.PI * 0.45;
                    if (b.children.length === 1) sA = 0;
                    let sS = a - (dir * sA / 2), st = b.children.length > 1 ? (dir * sA) / (b.children.length - 1) : 0;
                    
                    b.children.forEach((sub, j) => {
                        let sa = sS + (j * st), sx = bx + sO * Math.cos(sa), sy = by + sO * Math.sin(sa);
                        // Appel à drawCurve AVEC la couleur de la sous-bulle (sub.color)
                        drawCurve(cG, bx, by, sx, sy, sub.color); 
                        drawNode(nG, sub, sx, sy, `${i}-${j}`);
                    });
                }
            });
        }
        
        // CORRECTION MAJEURE DE L'AFFICHAGE DU CONTENU
        function drawNode(parent, nodeData, x, y, nodeId) {
            const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            group.setAttribute('class', 'node-group');
            group.onclick = function(e) { if(!isDraggingNode && !isPanningView && !e.target.classList.contains('resize-handle')) selectNodeFromCanvas(nodeId); };
            group.ondblclick = function(e) { e.stopPropagation(); startInPlaceEditing(nodeId, textEl); };
            group.oncontextmenu = function(e) { showContextMenu(e, nodeId); };
            
            const cx = Number(x) || 0, cy = Number(y) || 0, bSize = Number(nodeData.size) || 200, bRadius = bSize / 2;
            const fSize = Number(nodeData.fontSize) || 30, lineHeight = fSize * 1.25, shapeType = nodeData.shape || "circle";
            const isSelected = (nodeId === document.getElementById('node-select').value);
            
            const lines = (nodeData.text || "").split('\n');
            const hasIcon = nodeData.iconBase64 && nodeData.iconBase64 !== "";
            const scale = nodeData.iconSizeScale || 0.35;
            const iconSize = hasIcon ? bSize * scale : 0;
            const padding = 15;

            // 1. Calcul de la hauteur totale du contenu
            let contentHeight = (lines.length * lineHeight);
            if (hasIcon) contentHeight += iconSize + padding;

            // 2. Création de la forme avec une hauteur dynamique si c'est un rectangle
            let shapeEl;
            let shapeTopY, shapeBottomY;
            
            if (shapeType === "rect") {
                // Le rectangle s'assure d'être au minimum aussi haut que son contenu + marges
                let rectHeight = Math.max(bSize * 0.5, contentHeight + padding * 2);
                shapeTopY = cy - rectHeight / 2; 
                shapeBottomY = cy + rectHeight / 2;
                
                shapeEl = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                shapeEl.setAttribute('x', cx - bSize / 2); shapeEl.setAttribute('y', shapeTopY);
                shapeEl.setAttribute('width', bSize); shapeEl.setAttribute('height', rectHeight); 
                shapeEl.setAttribute('rx', '12');
            } else if (shapeType === "rhombus") {
                shapeTopY = cy - bRadius; shapeBottomY = cy + bRadius;
                shapeEl = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                shapeEl.setAttribute('points', `${cx},${shapeTopY} ${cx + bRadius},${cy} ${cx},${shapeBottomY} ${cx - bRadius},${cy}`);
            } else {
                shapeTopY = cy - bRadius; shapeBottomY = cy + bRadius;
                shapeEl = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                shapeEl.setAttribute('cx', cx); shapeEl.setAttribute('cy', cy); shapeEl.setAttribute('r', bRadius);
            }
            
            shapeEl.setAttribute('class', 'node-shape'); 
            shapeEl.setAttribute('fill', (nodeData.color && nodeData.color.startsWith('#')) ? nodeData.color : `url(#grad-${nodeData.color})`);
            shapeEl.setAttribute('stroke', isSelected ? '#000091' : 'rgba(0,0,0,0.1)');
            shapeEl.setAttribute('stroke-width', isSelected ? '4' : '1');
            shapeEl.setAttribute('filter', 'url(#shadow)');
            group.appendChild(shapeEl);

            // 3. Dessin du contenu, parfaitement centré sur l'axe Y (cy)
            let currentDrawY = cy - (contentHeight / 2);

            if (hasIcon) {
                const img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
                img.setAttribute('x', cx - iconSize / 2); img.setAttribute('y', currentDrawY); 
                img.setAttribute('width', iconSize); img.setAttribute('height', iconSize);
                img.setAttribute('preserveAspectRatio', 'xMidYMid meet');
                img.setAttributeNS('http://www.w3.org/1999/xlink', 'href', nodeData.iconBase64);
                if (!nodeData.isCustomImage) img.setAttribute('style', nodeData.textColor === '#FFFFFF' ? 'filter: invert(1) brightness(2);' : '');
                group.appendChild(img);

                if (isSelected) {
                    const handle = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    handle.setAttribute('class', 'resize-handle');
                    handle.setAttribute('x', cx + iconSize/2 - 6); handle.setAttribute('y', currentDrawY + iconSize - 6);
                    handle.setAttribute('width', 12); handle.setAttribute('height', 12);
                    handle.onpointerdown = (e) => {
                        e.stopPropagation(); isResizingIcon = true; resizeNodeId = nodeId;
                        initialIconScale = scale;
                        const s=document.getElementById('canvas'), pt=s.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
                        const ctm=s.getScreenCTM(); if(ctm) initialResizeY = pt.matrixTransform(ctm.inverse()).y;
                    };
                    group.appendChild(handle);
                }
                currentDrawY += iconSize + padding; // On descend le curseur pour le texte
            }

            const textEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            textEl.setAttribute('text-anchor', 'middle'); textEl.setAttribute('fill', nodeData.textColor);
            textEl.setAttribute('font-family', nodeData.fontFamily); textEl.setAttribute('font-size', fSize + 'px');
            if (nodeData.isBold) textEl.setAttribute('font-weight', 'bold');
            if (nodeData.isItalic) textEl.setAttribute('font-style', 'italic');
            if (nodeData.isStrike) textEl.setAttribute('text-decoration', 'line-through');

            lines.forEach((lineText, index) => {
                const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
                tspan.setAttribute('x', cx); 
                // On ajoute la moitié de la hauteur de ligne pour le centrage (dominant-baseline: central)
                tspan.setAttribute('y', currentDrawY + (index * lineHeight) + (lineHeight / 2));
                tspan.setAttribute('dominant-baseline', 'central'); 
                tspan.textContent = lineText; 
                textEl.appendChild(tspan);
            });
            
            group.appendChild(textEl); parent.appendChild(group); return group;
        }

        function getCleanSVGSource() { 
            const s=document.getElementById('node-select'), c=s.value; s.value="none_for_export"; renderSVG(); 
            const svg=document.getElementById('canvas'), {maxExtent}=calculateMaxExtent(), p=60, eS=(maxExtent*2)+(p*2);
            const oV=svg.getAttribute('viewBox'); svg.setAttribute('viewBox', `${-maxExtent-p} ${-maxExtent-p} ${eS} ${eS}`); 
            let src=new XMLSerializer().serializeToString(svg); 
            if(!src.match(/xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)) src=src.replace(/^<svg/,'<svg xmlns="http://www.w3.org/2000/svg"'); 
            svg.setAttribute('viewBox', oV); s.value=c; renderSVG(); return {source:src, exportSize:eS}; 
        }

        function exportSVG() { const {source}=getCleanSVGSource(); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([source], {type:'image/svg+xml;charset=utf-8'})); a.download='organigramme_valor.svg'; a.click(); }
        function exportPNG() { const {source, exportSize}=getCleanSVGSource(), s=3, fW=exportSize*s, fH=exportSize*s, i=new Image(); i.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(source))); i.onload=()=>{const c=document.createElement('canvas'); c.width=fW; c.height=fH; const ctx=c.getContext('2d'); ctx.drawImage(i,0,0,fW,fH); const a=document.createElement('a'); a.download='organigramme_valor.png'; a.href=c.toDataURL('image/png'); a.click();}; }

        document.getElementById('diagram-direction').value = diagramData.direction; initGradientsAndSelect(); initIconMenu(); updateSelectMenu(); loadNodeData(); initPanZoom(); initDefaultIcons(); 
    </script>
</body>
